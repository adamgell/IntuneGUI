name: Update Settings Catalog Definitions

# Fetches the full Intune Settings Catalog schema (setting definitions +
# categories) from Microsoft Graph Beta and commits the JSON to the repo.
# The JSON files are embedded in the .exe at build time so the app can
# resolve human-readable setting names without runtime Graph calls.

on:
  schedule:
    # Daily at 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  update-definitions:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch settings catalog definitions from Graph API
        shell: pwsh
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        run: |
          scripts/Fetch-SettingsCatalogDefinitions.ps1

      - name: Commit updated definitions if changed
        shell: pwsh
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/Intune.Commander.Core/Assets/settings-catalog-definitions.json.gz `
                  src/Intune.Commander.Core/Assets/settings-catalog-categories.json.gz
          $status = git status --porcelain
          if ($status) {
            git commit -m "chore: update settings catalog definitions [skip ci]"
            git push
            Write-Host "Committed settings catalog updates."
          } else {
            Write-Host "No changes detected; nothing to commit."
          }

name: Build Release Executable

on:
  push:
  pull_request:

jobs:
  build:
    if: "!contains(github.event.head_commit.message || '', '[skip ci]')"
    runs-on: windows-latest
    environment: production
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Build React first so wwwroot is available for dotnet publish
      - name: Build React frontend
        working-directory: intune-commander-react
        run: |
          npm ci
          npm run build

      - name: Verify React dist
        shell: bash
        run: |
          if [ ! -f "intune-commander-react/dist/index.html" ]; then
            echo "::error::React dist/index.html not found"
            exit 1
          fi

      - name: Restore dependencies
        run: dotnet restore Intune.Commander.sln

      - name: Build solution
        run: dotnet build Intune.Commander.sln --configuration Release --no-restore

      - name: Publish Windows x64 executable
        shell: pwsh
        run: |
          dotnet publish src/Intune.Commander.DesktopReact/Intune.Commander.DesktopReact.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            --output ./publish/desktop

      - name: Verify publish output
        shell: bash
        run: |
          if [ ! -f "./publish/desktop/IntuneCommander.exe" ]; then
            echo "::error::IntuneCommander.exe not found"
            exit 1
          fi
          if [ ! -f "./publish/desktop/wwwroot/index.html" ]; then
            echo "::error::wwwroot/index.html not found - React assets missing from build"
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Intune.Commander-win-x64
          path: ./publish/desktop/
          retention-days: 30

  publish-cli:
    if: "!contains(github.event.head_commit.message || '', '[skip ci]')"
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        run: dotnet restore Intune.Commander.sln

      - name: Publish CLI win-x64
        shell: pwsh
        run: |
          dotnet publish src/Intune.Commander.CLI/Intune.Commander.CLI.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            --output ./publish-cli/win-x64 `
            -p:PublishSingleFile=true

      - name: Upload CLI win-x64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: Intune.Commander.CLI-win-x64
          path: ./publish-cli/win-x64/ic.exe
          retention-days: 30

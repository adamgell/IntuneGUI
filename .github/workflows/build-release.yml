name: Build Release Executable

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  DESKTOP_PROJECT: src/Intune.Commander.DesktopReact/Intune.Commander.DesktopReact.csproj
  CLI_PROJECT: src/Intune.Commander.CLI/Intune.Commander.CLI.csproj
  INSTALLER_PROJECT: src/Intune.Commander.Installer/Intune.Commander.Installer.wixproj
  DESKTOP_PUBLISH_DIR: ./publish/desktop
  CLI_PUBLISH_DIR: ./publish/cli
  INSTALLER_OUTPUT_DIR: ./publish/installer

jobs:
  build:
    if: "!contains(github.event.head_commit.message || '', '[skip ci]')"
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Determine MSI version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          # MSI ProductVersion fields must satisfy major < 256, minor < 256, build < 65536.
          YEAR="$((10#$(date -u +%y)))"
          MONTH="$((10#$(date -u +%m)))"
          DAY="$((10#$(date -u +%d)))"
          BUILD_NUMBER="$(( DAY * 1000 + (GITHUB_RUN_NUMBER % 1000) ))"
          if [ "$YEAR" -ge 256 ] || [ "$MONTH" -ge 256 ] || [ "$BUILD_NUMBER" -ge 65536 ]; then
            echo "::error::Computed MSI ProductVersion exceeds MSI limits: ${YEAR}.${MONTH}.${BUILD_NUMBER}"
            exit 1
          fi
          PRODUCT_VERSION="${YEAR}.${MONTH}.${BUILD_NUMBER}"
          DISPLAY_VERSION="${YEAR}.${MONTH}.${DAY}-run${GITHUB_RUN_NUMBER}"
          echo "product_version=$PRODUCT_VERSION" >> "$GITHUB_OUTPUT"
          echo "display_version=$DISPLAY_VERSION" >> "$GITHUB_OUTPUT"
          echo "ProductVersion: $PRODUCT_VERSION"
          echo "DisplayVersion: $DISPLAY_VERSION"

      # Build React first so wwwroot is available for dotnet publish
      - name: Build React frontend
        working-directory: intune-commander-react
        run: |
          npm ci
          npm run build

      - name: Verify React dist
        shell: bash
        run: |
          if [ ! -f "intune-commander-react/dist/index.html" ]; then
            echo "::error::React dist/index.html not found"
            exit 1
          fi

      - name: Restore dependencies
        run: dotnet restore Intune.Commander.sln

      - name: Build solution
        run: dotnet build Intune.Commander.sln --configuration Release --no-restore

      - name: Publish Windows x64 executable
        shell: pwsh
        run: |
          dotnet publish ${{ env.DESKTOP_PROJECT }} `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            --output ${{ env.DESKTOP_PUBLISH_DIR }}

      - name: Verify publish output
        shell: bash
        run: |
          if [ ! -f "${{ env.DESKTOP_PUBLISH_DIR }}/IntuneCommander.exe" ]; then
            echo "::error::IntuneCommander.exe not found"
            exit 1
          fi
          if [ ! -f "${{ env.DESKTOP_PUBLISH_DIR }}/wwwroot/index.html" ]; then
            echo "::error::wwwroot/index.html not found - React assets missing from build"
            exit 1
          fi

      - name: Publish CLI for MSI packaging
        shell: pwsh
        run: |
          dotnet publish ${{ env.CLI_PROJECT }} `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            --output ${{ env.CLI_PUBLISH_DIR }} `
            -p:PublishSingleFile=true

      - name: Verify CLI publish output
        shell: bash
        run: |
          if [ ! -f "${{ env.CLI_PUBLISH_DIR }}/ic.exe" ]; then
            echo "::error::ic.exe not found"
            exit 1
          fi

      - name: Build MSI installer
        shell: pwsh
        run: |
          dotnet build ${{ env.INSTALLER_PROJECT }} `
            -c Release `
            -p:ProductVersion=${{ steps.version.outputs.product_version }} `
            -p:DisplayVersion=${{ steps.version.outputs.display_version }} `
            -p:DesktopPublishDir="${{ github.workspace }}\\publish\\desktop" `
            -p:CliPublishDir="${{ github.workspace }}\\publish\\cli" `
            -p:InstallerOutputDir="${{ github.workspace }}\\publish\\installer"

      - name: Verify MSI output
        shell: bash
        run: |
          MSI="${{ env.INSTALLER_OUTPUT_DIR }}/IntuneCommander-${{ steps.version.outputs.display_version }}-x64.msi"
          if [ ! -f "$MSI" ]; then
            echo "::error::MSI not found at $MSI"
            ls -la "${{ env.INSTALLER_OUTPUT_DIR }}/"
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Intune.Commander-win-x64
          path: ${{ env.DESKTOP_PUBLISH_DIR }}/
          retention-days: 30

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: IntuneCommander-test-msi
          path: ${{ env.INSTALLER_OUTPUT_DIR }}/IntuneCommander-${{ steps.version.outputs.display_version }}-x64.msi
          retention-days: 30

  publish-cli:
    if: "!contains(github.event.head_commit.message || '', '[skip ci]')"
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        run: dotnet restore Intune.Commander.sln

      - name: Publish CLI win-x64
        shell: pwsh
        run: |
          dotnet publish src/Intune.Commander.CLI/Intune.Commander.CLI.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            --output ./publish-cli/win-x64 `
            -p:PublishSingleFile=true

      - name: Upload CLI win-x64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: Intune.Commander.CLI-win-x64
          path: ./publish-cli/win-x64/ic.exe
          retention-days: 30

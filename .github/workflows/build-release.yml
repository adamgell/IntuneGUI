name: Build Release Artifacts

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      version:
        description: "Version for manual MSI builds (e.g. 0.4.5 or 0.4.5-beta1)"
        required: false

env:
  DEFAULT_MSI_VERSION_PREFIX: 0.0
  DESKTOP_PROJECT: src/Intune.Commander.DesktopReact/Intune.Commander.DesktopReact.csproj
  CLI_PROJECT: src/Intune.Commander.CLI/Intune.Commander.CLI.csproj
  INSTALLER_PACKAGE: src/Intune.Commander.Installer/package.json
  DESKTOP_PUBLISH_DIR: ./publish/desktop
  DESKTOP_PUBLISH_DIR_ARM64: ./publish/desktop-arm64
  CLI_PUBLISH_DIR: ./publish/cli
  CLI_PUBLISH_DIR_ARM64: ./publish/cli-arm64
  INSTALLER_OUTPUT_DIR: ./publish/installer
  REACT_DIR: intune-commander-react

jobs:
  build:
    if: "!contains(github.event.head_commit.message || '', '[skip ci]')"
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Master Packager Dev
        shell: pwsh
        run: |
          $installer = "$env:TEMP\mpdev.msi"
          Invoke-WebRequest -Uri "https://cdn.masterpackager.com/installer/dev/2.1.1/mpdev_self_contained_x64_2.1.1.msi" -OutFile $installer
          Start-Process msiexec.exe -ArgumentList "/i `"$installer`" /quiet /norestart" -Wait
          "C:\Program Files\Master Packager Ltd\Master Packager Dev" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Determine MSI version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${{ env.DEFAULT_MSI_VERSION_PREFIX }}.${{ github.run_number }}"
          fi
          # MSI ProductVersion fields must satisfy major < 256, minor < 256, build < 65536.
          YEAR="$((10#$(date -u +%y)))"
          MONTH="$((10#$(date -u +%m)))"
          DAY="$((10#$(date -u +%d)))"
          BUILD_NUMBER="$(( DAY * 1000 + (GITHUB_RUN_NUMBER % 1000) ))"
          if [ "$YEAR" -ge 256 ] || [ "$MONTH" -ge 256 ] || [ "$BUILD_NUMBER" -ge 65536 ]; then
            echo "::error::Computed MSI ProductVersion exceeds MSI limits: ${YEAR}.${MONTH}.${BUILD_NUMBER}"
            exit 1
          fi
          PRODUCT_VERSION="${YEAR}.${MONTH}.${BUILD_NUMBER}"
          DISPLAY_VERSION="$VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "product_version=$PRODUCT_VERSION" >> "$GITHUB_OUTPUT"
          echo "display_version=$DISPLAY_VERSION" >> "$GITHUB_OUTPUT"
          echo "ProductVersion: $PRODUCT_VERSION"
          echo "DisplayVersion: $DISPLAY_VERSION"

      # Build React first so wwwroot is available for dotnet publish
      - name: Build React frontend
        working-directory: ${{ env.REACT_DIR }}
        run: |
          npm ci
          npm run build

      - name: Verify React dist
        shell: bash
        run: |
          if [ ! -f "${{ env.REACT_DIR }}/dist/index.html" ]; then
            echo "::error::React dist/index.html not found"
            exit 1
          fi

      - name: Restore dependencies
        run: dotnet restore Intune.Commander.sln

      - name: Build solution
        run: dotnet build Intune.Commander.sln --configuration Release --no-restore

      - name: Publish Windows x64 executable
        shell: pwsh
        run: |
          dotnet publish ${{ env.DESKTOP_PROJECT }} `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            --output ${{ env.DESKTOP_PUBLISH_DIR }} `
            -p:Version=${{ steps.version.outputs.version }}

      - name: Publish Windows arm64 executable
        shell: pwsh
        run: |
          dotnet publish ${{ env.DESKTOP_PROJECT }} `
            --configuration Release `
            --runtime win-arm64 `
            --self-contained true `
            --output ${{ env.DESKTOP_PUBLISH_DIR_ARM64 }} `
            -p:Version=${{ steps.version.outputs.version }}

      - name: Publish CLI win-x64
        shell: pwsh
        run: |
          dotnet publish ${{ env.CLI_PROJECT }} `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            --output ${{ env.CLI_PUBLISH_DIR }} `
            -p:PublishSingleFile=true `
            -p:Version=${{ steps.version.outputs.version }}

      - name: Publish CLI win-arm64
        shell: pwsh
        run: |
          dotnet publish ${{ env.CLI_PROJECT }} `
            --configuration Release `
            --runtime win-arm64 `
            --self-contained true `
            --output ${{ env.CLI_PUBLISH_DIR_ARM64 }} `
            -p:PublishSingleFile=true `
            -p:Version=${{ steps.version.outputs.version }}

      - name: Verify publish output
        shell: bash
        run: |
          if [ ! -f "${{ env.DESKTOP_PUBLISH_DIR }}/IntuneCommander.exe" ]; then
            echo "::error::IntuneCommander.exe (x64) not found"
            exit 1
          fi
          if [ ! -f "${{ env.DESKTOP_PUBLISH_DIR_ARM64 }}/IntuneCommander.exe" ]; then
            echo "::error::IntuneCommander.exe (arm64) not found"
            exit 1
          fi
          if [ ! -f "${{ env.DESKTOP_PUBLISH_DIR }}/wwwroot/index.html" ]; then
            echo "::error::wwwroot/index.html not found (x64) - React assets missing from build"
            exit 1
          fi
          if [ ! -f "${{ env.DESKTOP_PUBLISH_DIR_ARM64 }}/wwwroot/index.html" ]; then
            echo "::error::wwwroot/index.html not found (arm64) - React assets missing from build"
            exit 1
          fi
          if [ ! -f "${{ env.CLI_PUBLISH_DIR }}/ic.exe" ]; then
            echo "::error::ic.exe (x64) not found"
            exit 1
          fi
          if [ ! -f "${{ env.CLI_PUBLISH_DIR_ARM64 }}/ic.exe" ]; then
            echo "::error::ic.exe (arm64) not found"
            exit 1
          fi

      - name: Build x64 MSI and MSIX installers
        shell: pwsh
        env:
          IC_DESKTOP_PUBLISH_DIR: ${{ github.workspace }}\publish\desktop
          IC_CLI_PUBLISH_DIR: ${{ github.workspace }}\publish\cli
        run: |
          New-Item -ItemType Directory -Force -Path "${{ github.workspace }}\publish\installer" | Out-Null
          mpdev build ${{ env.INSTALLER_PACKAGE }} `
            --working-dir "${{ github.workspace }}" `
            --properties `
              "$.version=${{ steps.version.outputs.product_version }}" `
              "$.outputFileName=IntuneCommander-${{ steps.version.outputs.display_version }}-x64"

      - name: Build arm64 MSI and MSIX installers
        shell: pwsh
        env:
          IC_DESKTOP_PUBLISH_DIR: ${{ github.workspace }}\publish\desktop-arm64
          IC_CLI_PUBLISH_DIR: ${{ github.workspace }}\publish\cli-arm64
        run: |
          mpdev build ${{ env.INSTALLER_PACKAGE }} `
            --working-dir "${{ github.workspace }}" `
            --properties `
              "$.version=${{ steps.version.outputs.product_version }}" `
              "$.outputFileName=IntuneCommander-${{ steps.version.outputs.display_version }}-arm64" `
              "$.platform=arm64"

      - name: Verify installer output
        shell: bash
        run: |
          for ARCH in x64 arm64; do
            MSI="${{ env.INSTALLER_OUTPUT_DIR }}/IntuneCommander-${{ steps.version.outputs.display_version }}-${ARCH}.msi"
            MSIX="${{ env.INSTALLER_OUTPUT_DIR }}/IntuneCommander-${{ steps.version.outputs.display_version }}-${ARCH}.msix"
            for f in "$MSI" "$MSIX"; do
              if [ ! -f "$f" ]; then
                echo "::error::Expected installer not found: $f"
                ls -la "${{ env.INSTALLER_OUTPUT_DIR }}/" || true
                exit 1
              fi
            done
          done

      - name: Upload desktop artifact (x64)
        uses: actions/upload-artifact@v4
        with:
          name: Intune.Commander-win-x64
          path: ${{ env.DESKTOP_PUBLISH_DIR }}/
          retention-days: 30

      - name: Upload desktop artifact (arm64)
        uses: actions/upload-artifact@v4
        with:
          name: Intune.Commander-win-arm64
          path: ${{ env.DESKTOP_PUBLISH_DIR_ARM64 }}/
          retention-days: 30

      - name: Upload MSI artifact (x64)
        uses: actions/upload-artifact@v4
        with:
          name: IntuneCommander-test-msi-x64
          path: ${{ env.INSTALLER_OUTPUT_DIR }}/IntuneCommander-${{ steps.version.outputs.display_version }}-x64.msi
          retention-days: 30

      - name: Upload MSI artifact (arm64)
        uses: actions/upload-artifact@v4
        with:
          name: IntuneCommander-test-msi-arm64
          path: ${{ env.INSTALLER_OUTPUT_DIR }}/IntuneCommander-${{ steps.version.outputs.display_version }}-arm64.msi
          retention-days: 30

      - name: Upload MSIX artifact (x64)
        uses: actions/upload-artifact@v4
        with:
          name: IntuneCommander-test-msix-x64
          path: ${{ env.INSTALLER_OUTPUT_DIR }}/IntuneCommander-${{ steps.version.outputs.display_version }}-x64.msix
          retention-days: 30

      - name: Upload MSIX artifact (arm64)
        uses: actions/upload-artifact@v4
        with:
          name: IntuneCommander-test-msix-arm64
          path: ${{ env.INSTALLER_OUTPUT_DIR }}/IntuneCommander-${{ steps.version.outputs.display_version }}-arm64.msix
          retention-days: 30

      - name: Upload CLI win-x64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: Intune.Commander.CLI-win-x64
          path: ${{ env.CLI_PUBLISH_DIR }}/ic.exe
          retention-days: 30

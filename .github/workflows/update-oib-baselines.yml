name: Update OIB Baselines

# Fetches Open Intune Baseline (OIB) policy JSON files from GitHub
# (SkipToTheEndpoint/OpenIntuneBaseline) and commits the gzipped assets
# to the repo. The files are embedded in the .exe at build time so the
# app ships with current OIB baselines for comparison.

on:
  schedule:
    # Weekly on Monday at 07:00 UTC
    - cron: "0 7 * * 1"
  workflow_dispatch:

jobs:
  update-baselines:
    runs-on: windows-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch OIB baselines from GitHub
        shell: pwsh
        run: |
          scripts/Fetch-OibBaselines.ps1

      - name: Create PR if baselines changed
        shell: pwsh
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/Intune.Commander.Core/Assets/oib-sc-baselines.json.gz `
                  src/Intune.Commander.Core/Assets/oib-es-baselines.json.gz `
                  src/Intune.Commander.Core/Assets/oib-compliance-baselines.json.gz
          $status = git status --porcelain
          if ($status) {
            $branch = "chore/update-oib-baselines-$(Get-Date -Format 'yyyy-MM-dd')"
            git checkout -b $branch
            git commit -m "chore: update OIB baselines"
            git push -u origin $branch
            gh pr create --title "chore: update OIB baselines" `
                         --body "Automated weekly update of Open Intune Baseline assets." `
                         --base main
            Write-Host "Created PR for OIB baseline updates."
          } else {
            Write-Host "No changes detected; nothing to commit."
          }
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
